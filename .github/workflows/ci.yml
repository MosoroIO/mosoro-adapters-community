name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.4.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install mosoro-core from source (not yet on PyPI)
        run: pip install "git+https://github.com/MosoroIO/mosoro-core.git@main"

      - name: Install individual adapters from source (not yet on PyPI)
        run: |
          pip install -e "adapters/locus"
          pip install -e "adapters/mir"
          pip install -e "adapters/fetch"
          pip install -e "adapters/geekplus"
          pip install -e "adapters/stretch"

      - name: Install meta-package and dev dependencies
        run: pip install -e ".[dev]" --no-deps

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

      - name: Run tests
        run: pytest tests/ -v
