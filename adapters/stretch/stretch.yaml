# Mosoro Edge Agent Configuration - Boston Dynamics Stretch
#
# Dependency: This adapter requires the `roslibpy` Python library.
#   pip install roslibpy
# The Stretch robot must be running `rosbridge_server` (part of rosbridge_suite).
# See README.md in this directory for full setup instructions.

robot_id: "stretch-001"
vendor: "stretch"

# rosbridge WebSocket connection (Stretch uses ROS 2 via rosbridge_server)
# Start rosbridge on the Stretch: ros2 launch rosbridge_server rosbridge_websocket_launch.xml
rosbridge_host: "192.168.1.101"
rosbridge_port: 9090

# Map identifier for position reporting
map_id: "warehouse_map_01"

# ROS 2 topic names (adjust if your Stretch uses a different namespace)
topic_joint_states: "/stretch/joint_states"
topic_battery: "/battery_state"
topic_odom: "/odom"
topic_diagnostics: "/diagnostics_agg"
topic_cmd_vel: "/stretch/cmd_vel"
topic_navigate: "/stretch/navigate_to_pose"
topic_joint_trajectory: "/stretch/joint_trajectory"
topic_gripper: "/stretch/gripper_command"

# MQTT settings (production: TLS on port 8883)
mqtt_broker: "mosquitto"
mqtt_port: 8883
mqtt_use_tls: true
# mqtt_ca_cert: "/run/secrets/mqtt_ca_cert"       # via Docker secrets
# mqtt_client_cert: "/certs/stretch-001.crt"      # for mTLS
# mqtt_client_key: "/certs/stretch-001.key"       # for mTLS

# Polling and logging (Stretch benefits from slightly faster polling)
poll_interval: 4.0
log_level: "INFO"
api_timeout: 12.0
max_retries: 3
