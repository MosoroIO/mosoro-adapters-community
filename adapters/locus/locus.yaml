# Tip: Use `make setup` in mosoro-core to configure this automatically
# Mosoro Edge Agent Configuration - Locus Robotics
robot_id: "locus-001"
vendor: "locus"

# Locus-specific connection details
# Leave api_base_url commented out to use LOCUS_HOST / LOCUS_PORT env vars.
# Uncomment and set explicitly to override env vars.
# api_base_url: "http://192.168.1.50:8080/api"

# Leave api_key commented out to use LOCUS_API_KEY env var.
# api_key: "your-api-key-here"

# MQTT settings (production: TLS on port 8883)
mqtt_broker: "mosquitto"
mqtt_port: 8883
mqtt_use_tls: true
# mqtt_ca_cert: "/run/secrets/mqtt_ca_cert"       # via Docker secrets
# mqtt_client_cert: "/certs/locus-001.crt"        # for mTLS
# mqtt_client_key: "/certs/locus-001.key"         # for mTLS

# Polling and logging
poll_interval: 5.0
log_level: "INFO"
api_timeout: 10.0
max_retries: 3
